version: "3.9"

services:
  nexus-chat:
    build: .
    container_name: nexus-chat
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount config for easy editing without rebuild
      - ./config:/app/config:ro
      # Persist uploaded files and vector store
      - ./data:/app/data
    extra_hosts:
      # Allow container to reach Ollama on the host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
