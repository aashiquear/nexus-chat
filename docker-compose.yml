# Shared network so standalone MCP servers can also connect.
# Create it once with:  docker network create nexus-net
# Standalone containers join with:  docker run --network nexus-net ...
networks:
  nexus-net:
    name: nexus-net
    driver: bridge

services:
  nexus-chat:
    build: .
    container_name: nexus-chat
    networks:
      - nexus-net
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount config for easy editing without rebuild
      - ./config:/app/config:ro
      # Persist uploaded files and vector store
      - ./data:/app/data
    extra_hosts:
      # Allow container to reach Ollama on the host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── MCP Servers (optional, enable with: docker compose --profile mcp up) ──

  mcp-database:
    build: ./examples/mcp-database-server
    networks:
      - nexus-net
    profiles:
      - mcp
    ports:
      - "8100:8100"
    volumes:
      - mcp-db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  mcp-db-data:
