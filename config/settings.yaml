# ============================================================
# Nexus Chat - Configuration
# ============================================================
# Edit this file to configure LLM providers, tools, and RAG.
# Restart the server after making changes.
# ============================================================

app:
  name: "Nexus Chat"
  version: "0.1.0"
  host: "0.0.0.0"
  port: 8000
  debug: false
  # Secret key for sessions (change in production!)
  secret_key: "change-me-in-production"

# ------------------------------------------------------------
# LLM Providers
# ------------------------------------------------------------
# Enable/disable providers and set API keys here.
# You can also set keys via environment variables:
#   ANTHROPIC_API_KEY, OPENAI_API_KEY
# ------------------------------------------------------------
providers:
  anthropic:
    enabled: true
    api_key: "${ANTHROPIC_API_KEY}"  # Set via env var or paste key here
    default_model: "claude-sonnet-4-20250514"
    models:
      - id: "claude-sonnet-4-20250514"
        name: "Claude Sonnet 4"
        max_tokens: 8192
      - id: "claude-haiku-4-5-20251001"
        name: "Claude Haiku 4.5"
        max_tokens: 8192

  openai:
    enabled: true
    api_key: "${OPENAI_API_KEY}"
    default_model: "gpt-4o"
    models:
      - id: "gpt-4o"
        name: "GPT-4o"
        max_tokens: 4096
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        max_tokens: 4096

  ollama:
    enabled: true
    # For local Ollama: http://localhost:11434
    # For Ollama Cloud: https://ollama.com/api (requires OLLAMA_API_KEY)
    base_url: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    api_key: "${OLLAMA_API_KEY}"  # Required for Ollama Cloud, leave empty for local
    default_model: "llama3.2"
    models:
      # --- Cloud models (Ollama Cloud) ---
      - id: "gemma4:latest"
        name: "Gemma 4"
        max_tokens: 4096
      - id: "ministral-3:latest"
        name: "Ministral 3"
        max_tokens: 4096
      - id: "gpt-oss:latest"
        name: "GPT-OSS"
        max_tokens: 4096
      - id: "devstral-2:latest"
        name: "Devstral 2"
        max_tokens: 4096
      # --- Local models ---
      - id: "llama4:latest"
        name: "Llama 4"
        max_tokens: 4096
      - id: "qwen3.5:27b"
        name: "Qwen 3.5"
        max_tokens: 4096
      - id: "qwen2.5:latest"
        name: "Qwen 2.5"
        max_tokens: 4096
      - id: "llama3.2"
        name: "Llama 3.2"
        max_tokens: 4096
      - id: "mistral"
        name: "Mistral"
        max_tokens: 4096
      - id: "codellama"
        name: "Code Llama"
        max_tokens: 4096

# ------------------------------------------------------------
# Tools
# ------------------------------------------------------------
# Each tool is a Python module in backend/tools/
# Set enabled: true/false to toggle tools.
# To add a new tool:
#   1. Create a Python file in backend/tools/
#   2. Implement the Tool base class
#   3. Add an entry here
# ------------------------------------------------------------
tools:
  calculator:
    enabled: true
    name: "Calculator"
    description: "Evaluate mathematical expressions"
    icon: "calculator"

  web_search:
    enabled: true
    name: "Web Search"
    description: "Search the web for current information"
    icon: "search"
    config:
      api_key: "${SEARCH_API_KEY}"
      engine: "duckduckgo"  # or "google", "bing"

  code_executor:
    enabled: true
    name: "Code Executor"
    description: "Execute Python code in a sandboxed environment"
    icon: "code"
    config:
      timeout: 30
      max_memory_mb: 256

  datetime_tool:
    enabled: true
    name: "Date & Time"
    description: "Get current date, time, and timezone info"
    icon: "clock"

  file_reader:
    enabled: true
    name: "File Reader"
    description: "Read and parse uploaded files"
    icon: "file-text"

  svg_diagram:
    enabled: true
    name: "SVG Diagram"
    description: "Generate SVG architecture diagrams from descriptions"
    icon: "image"
    config:
      output_dir: "./data/uploads"

# ------------------------------------------------------------
# MCP Servers (Model Context Protocol)
# ------------------------------------------------------------
# External services that expose tools via the MCP protocol.
# Each server runs independently (e.g. in a Docker container)
# and Nexus Chat connects to it over HTTP JSON-RPC.
# To add a new MCP server:
#   1. Deploy the server (Docker, bare-metal, etc.)
#   2. Add an entry here with its URL
#   3. Restart Nexus Chat — its tools appear in the sidebar
# ------------------------------------------------------------
mcp_servers:
  # Example: SQLite database server (see examples/mcp-database-server)
  database:
    enabled: true
    name: "Database"
    description: "Query and manage a SQLite database"
    url: "http://mcp-database:8100"   # Docker service name
    icon: "database"
    timeout: 30

# ------------------------------------------------------------
# RAG (Retrieval-Augmented Generation)
# ------------------------------------------------------------
rag:
  enabled: true
  chunk_size: 1000
  chunk_overlap: 200
  # Embedding provider: "local" (sentence-transformers) or "openai"
  embedding_provider: "local"
  embedding_model: "all-MiniLM-L6-v2"
  # Vector store: "chroma" or "faiss"
  vector_store: "chroma"
  persist_directory: "./data/vector_store"
  # Max number of chunks to retrieve
  top_k: 5

# ------------------------------------------------------------
# File Upload
# ------------------------------------------------------------
uploads:
  max_file_size_mb: 50
  allowed_extensions:
    - ".txt"
    - ".pdf"
    - ".md"
    - ".csv"
    - ".json"
    - ".py"
    - ".js"
    - ".html"
    - ".docx"
  upload_directory: "./data/uploads"
